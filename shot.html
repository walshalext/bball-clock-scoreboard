<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shot Clock</title>
  <link rel="stylesheet" href="/common.css" />
  <style>
    /* FIBA Diagram 10: shot clock display unit + duplicate game clock,
       mounted above the backboard support structure. Shot clock numbers
       in red, duplicate game clock in yellow, shot clock numbers larger. */
    :root {
      --bg: #000;
      --shot: #ff3030;
      --shot-glow: rgba(255,48,48,0.55);
      --game: #ffd233;
      --game-glow: rgba(255,210,51,0.45);
      --muted: #555;
    }
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg);
                 color: var(--shot); overflow: hidden;
                 font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                 font-variant-numeric: tabular-nums; }
    .stage { width: 100vw; height: calc(100vh - var(--sb-height, 34px));
             display: grid; grid-template-rows: 4fr 2fr;
             padding: 3vh 4vw; }
    .shot-wrap { display: flex; align-items: center; justify-content: center; }
    .shot {
      font-size: min(68vh, 64vw);
      font-weight: 900; line-height: 1;
      color: var(--shot);
      text-shadow: 0 0 18px var(--shot-glow), 0 0 56px var(--shot-glow);
      letter-spacing: 0.02em;
    }
    .shot.hidden { opacity: 0.1; }

    .game-wrap { display: flex; align-items: center; justify-content: center; gap: 4vw; }
    .game-label { font-size: 3vh; color: var(--muted); letter-spacing: 0.3em;
                  text-transform: uppercase; }
    .game-clock {
      font-size: min(28vh, 22vw);
      font-weight: 900; line-height: 1;
      color: var(--game);
      text-shadow: 0 0 12px var(--game-glow);
    }

    /* Edge-lights frame (FIBA §1.1.6 / §1.1.7 analog): full-screen inset
       glow that flashes red on period buzzer, yellow on shot-clock buzzer. */
    .edge-lights {
      position: fixed; inset: 0; pointer-events: none; z-index: 60;
      box-shadow: inset 0 0 0 0 transparent;
      transition: box-shadow 0.15s ease-out;
    }
    .edge-lights.flash-period {
      box-shadow:
        inset 0 0 0 2.5vh rgba(255, 48, 48, 0.95),
        inset 0 0 14vh   rgba(255, 48, 48, 0.55),
        inset 0 0 28vh   rgba(255, 48, 48, 0.25);
    }
    .edge-lights.flash-shot {
      box-shadow:
        inset 0 0 0 2.5vh rgba(255, 210, 51, 0.95),
        inset 0 0 14vh   rgba(255, 210, 51, 0.55),
        inset 0 0 28vh   rgba(255, 210, 51, 0.25);
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="shot-wrap"><div class="shot" id="shot">24</div></div>
    <div class="game-wrap">
      <span class="game-label">Game</span>
      <div class="game-clock" id="gclock">00:00</div>
    </div>
  </div>

  <div id="edge-lights" class="edge-lights"></div>

  <script src="/common.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);

    function loop() {
      const s = Scoreboard.getState();
      if (s) {
        const sms = Scoreboard.computeDisplayedShotMs();
        const gms = Scoreboard.computeDisplayedGameMs();
        const se = $("shot");
        if (s.sc_visible) {
          se.textContent = Scoreboard.formatShot(sms);
          se.classList.remove("hidden");
        } else {
          se.textContent = "·";
          se.classList.add("hidden");
        }
        $("gclock").textContent = Scoreboard.formatClock(gms, { showTenths: true });
      }
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    Scoreboard.onBuzzer((b) => {
      const el = $("edge-lights");
      if (b.kind === "period") {
        el.classList.add("flash-period");
        setTimeout(() => el.classList.remove("flash-period"), 2000);
      } else {
        el.classList.add("flash-shot");
        setTimeout(() => el.classList.remove("flash-shot"), 1000);
      }
    });

    Scoreboard.connect();
  </script>
</body>
</html>
