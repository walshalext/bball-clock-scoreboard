<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Team Fouls</title>
  <link rel="stylesheet" href="/common.css" />
  <style>
    /* FIBA §8: Team foul marker on the scorer's table.
       - Min 250 mm tall, 125 mm wide.
       - Shows current team fouls 0..4.
       - After ball becomes live following the 4th team foul, the marker is
         fully RED with no number visible (penalty / bonus situation).
       Use this view at full-screen on a tablet/phone next to each team. */
    :root {
      --bg: #000;
      --amber: #ff8c1a;
      --red: #ff2424;
      --muted: #555;
      --white: #fff;
    }
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg);
                 color: var(--amber); overflow: hidden;
                 font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                 font-variant-numeric: tabular-nums; }
    .stage { width: 100vw; height: calc(100vh - var(--sb-height, 34px));
             display: grid; grid-template-rows: auto 1fr;
             padding: 2vh 4vw; gap: 1vh; }
    .head {
      text-align: center; font-size: 4vh; font-weight: 800;
      color: var(--white); letter-spacing: 0.15em; text-transform: uppercase;
    }
    .head .team {
      color: var(--amber);
    }
    .num-wrap {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      border-radius: 2vh; border: 0.4vh solid var(--amber);
      background: #050505;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    .num-wrap.bonus { background: var(--red); border-color: var(--red); }
    .num {
      font-size: 70vh; font-weight: 900; color: var(--amber); line-height: 1;
      text-shadow: 0 0 24px rgba(255,140,26,0.4),
                   0 0 60px rgba(255,140,26,0.25);
    }
    .num-wrap.bonus .num { display: none; }
    .bonus-label {
      display: none;
      position: absolute; bottom: 6vh; left: 0; right: 0;
      text-align: center; font-size: 10vh; font-weight: 900;
      color: rgba(255,255,255,0.9); letter-spacing: 0.2em;
    }
    .num-wrap.bonus .bonus-label { display: block; }

  </style>
</head>
<body>
  <div class="stage">
    <div class="head"><span class="team" id="team-name">—</span> Team Fouls</div>
    <div class="num-wrap" id="wrap">
      <div class="num" id="num">0</div>
      <div class="bonus-label">BONUS</div>
    </div>
  </div>

  <script src="/common.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    const params = new URLSearchParams(location.search);
    const side = (params.get("team") || "home").toLowerCase() === "away" ? "away" : "home";

    function applyState(s) {
      const team = s[side];
      $("team-name").textContent = team.name || side.toUpperCase();
      $("num").textContent = team.team_fouls;
      $("wrap").classList.toggle("bonus", !!team.bonus);
    }
    Scoreboard.onState(applyState);

    Scoreboard.connect();
  </script>
</body>
</html>
