<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Possession Arrow</title>
  <style>
    /* FIBA §9: alternating possession arrow, illuminated bright red.
       Direction-only (decoupled from teams); the operator picks Left,
       Right, or Off. This view has its own per-device "Invert" toggle
       (persisted in localStorage, default ON) so a screen on the opposite
       side of the court can mirror the operator's choice automatically. */
    :root {
      --bg: #000;
      --red: #ff2424;
      --red-glow: rgba(255,36,36,0.7);
      --muted: #666;
      --dim: #333;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg);
                 color: var(--red); overflow: hidden;
                 font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }

    /* Stage: header at top, gigantic arrow filling the rest, footer at bottom. */
    .stage { width: 100vw; height: 100vh;
             display: grid; grid-template-rows: auto 1fr auto;
             padding: 1.5vh 2vw; gap: 1vh; }

    .header { display: flex; align-items: center; justify-content: space-between;
              color: var(--muted); font-size: 2vh; letter-spacing: 0.3em;
              text-transform: uppercase; }
    .header .title { color: var(--muted); }
    .header .invert {
      color: var(--muted); cursor: pointer;
      background: transparent; border: 1px solid var(--dim);
      padding: 0.6vh 1.2vw; border-radius: 0.8vh;
      font-family: inherit; font-size: 1.6vh; letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .header .invert:hover { color: #fff; border-color: var(--muted); }
    .header .invert.on  { color: #ffd233; border-color: #ffd233; }
    .header .invert .lbl { opacity: 0.7; margin-right: 0.4vw; }

    .arrow-stage {
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    /* Fill the available width and height. Use a viewBox shaped to a long,
       wide arrow; preserveAspectRatio="xMidYMid meet" keeps it proportional. */
    .arrow {
      width: 100%; height: 100%;
      filter: drop-shadow(0 0 24px var(--red-glow))
              drop-shadow(0 0 56px var(--red-glow));
      transition: transform 0.25s cubic-bezier(.22,.61,.36,1),
                  opacity 0.2s ease;
    }
    .arrow path { fill: var(--red); }
    .arrow.left  { transform: scaleX(1); }
    .arrow.right { transform: scaleX(-1); }
    .arrow.off   { opacity: 0; }

    .off-state {
      position: absolute; left: 0; right: 0; top: 0; bottom: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--dim); font-size: 6vh; letter-spacing: 0.3em;
      text-transform: uppercase; pointer-events: none;
      opacity: 0; transition: opacity 0.2s ease;
    }
    .off-state.shown { opacity: 1; }

    .footer { display: flex; justify-content: space-between; align-items: center;
              font-size: 1.6vh; color: var(--muted); padding: 0 1vw; }
    .conn-dot { display: inline-block; width: 1.2vh; height: 1.2vh; border-radius: 50%;
                background: var(--muted); margin-right: 0.6vh; vertical-align: middle; }
    .conn-dot.ok { background: #2ea043; } .conn-dot.bad { background: var(--red); }
  </style>
</head>
<body>
  <div class="stage">
    <div class="header">
      <span class="title">Alternating Possession</span>
      <button id="invert-btn" class="invert" title="Flip the displayed direction. Persists on this device.">
        <span class="lbl">Invert</span><span id="invert-state">on</span>
      </button>
    </div>

    <div class="arrow-stage" style="position: relative">
      <!-- Arrow shape: thick horizontal body, large triangular head pointing
           left by default. CSS scaleX(-1) flips it for "right". The viewBox
           is wide so the arrow fills the screen nicely. -->
      <svg id="arrow" class="arrow left"
           viewBox="0 0 100 40" xmlns="http://www.w3.org/2000/svg"
           preserveAspectRatio="xMidYMid meet" aria-hidden="true">
        <path d="M 4,20 L 38,2 L 38,13 L 98,13 L 98,27 L 38,27 L 38,38 Z" />
      </svg>
      <div id="off-state" class="off-state">Possession not set</div>
    </div>

    <div class="footer">
      <span><span class="conn-dot" id="conn-dot"></span><span id="conn-text">…</span></span>
      <span id="latency">—</span>
    </div>
  </div>

  <script src="/common.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);

    // ----- per-device invert toggle (localStorage) -----
    // Default ON so a display facing away from the operator matches the
    // operator's chosen direction.
    const INVERT_KEY = "possession.invert";
    function getInvert() {
      const v = localStorage.getItem(INVERT_KEY);
      if (v === null) return true;       // default ON
      return v === "1";
    }
    function setInvert(on) {
      localStorage.setItem(INVERT_KEY, on ? "1" : "0");
      paintInvertChip(on);
      // Re-render the arrow with the new setting.
      const s = Scoreboard.getState();
      if (s) applyState(s);
    }
    function paintInvertChip(on) {
      $("invert-state").textContent = on ? "ON" : "OFF";
      $("invert-btn").classList.toggle("on", on);
    }
    $("invert-btn").addEventListener("click", () => setInvert(!getInvert()));
    paintInvertChip(getInvert());

    // ----- apply server state to the arrow -----
    function displayedDirection(serverDir) {
      // "off" passes through unchanged.
      if (serverDir !== "left" && serverDir !== "right") return "off";
      if (getInvert()) return serverDir === "left" ? "right" : "left";
      return serverDir;
    }
    function applyState(s) {
      const dir = displayedDirection(s.possession);
      const arrow = $("arrow");
      arrow.classList.remove("left", "right", "off");
      arrow.classList.add(dir);
      $("off-state").classList.toggle("shown", dir === "off");
    }
    Scoreboard.onState(applyState);

    // ----- connection + latency + fullscreen -----
    Scoreboard.onStatus((e) => {
      const dot = $("conn-dot"), txt = $("conn-text"); dot.className = "conn-dot";
      if (e.status === "open") { dot.classList.add("ok"); txt.textContent = "live"; }
      else if (e.status === "closed") { dot.classList.add("bad"); txt.textContent = "offline"; }
      else { txt.textContent = e.status; }
    });
    setInterval(() => {
      const rtt = Scoreboard.getBestRttMs();
      $("latency").textContent = isFinite(rtt) ? `rtt ${rtt.toFixed(1)}ms` : "—";
    }, 500);

    document.addEventListener("keydown", (e) => {
      if (e.key === "f" || e.key === "F") {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
      } else if (e.key === "i" || e.key === "I") {
        setInvert(!getInvert());
      }
    });

    Scoreboard.connect();
  </script>
</body>
</html>
