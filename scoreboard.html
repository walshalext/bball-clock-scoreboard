<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Scoreboard</title>
  <link rel="stylesheet" href="/common.css" />
  <style>
    /* Three-column scoreboard inspired by FIBA Official Basketball Rules
       2024 — Diagram 9, with a few deliberate departures for clarity on
       a computer screen:

         - both rosters share the same column order (#, NAME, FOULS, PTS)
         - period indicator sits on its own line so a 3-digit score
           doesn't shift its position
         - labels (TIME-OUTS, TEAM FOULS) sit ABOVE the row they describe

       URL toggles, evaluated against the live state:
         ?name=off|last|fi-last|last-fi|first-last     (default last-fi)
         ?numbers=on|off                               (default on)
         ?fouls=off|numeric|dots                       (default dots)
         ?points=on|off                                (default on)
         ?rosters=on|off                               (default on)

       Set ?rosters=off when the player rosters live on their own dedicated
       displays via /players?team=home and /players?team=away — the centre
       column then takes the full screen width.
    */
    :root {
      --bg: #000;
      --amber: #ff8c1a;
      --yellow: #ffd233;
      --red: #ff3030;
      --green: #2ea043;
      --muted: #555;
      --dim: #1a1a1a;
      --border: #2a2a2a;
      --white: #fff;

      /* Set at runtime from the URL toggles so home + away rosters share
         identical column boundaries. */
      --roster-cols: 3ch 1fr auto 3ch;
    }
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg);
                 color: var(--amber); overflow: hidden;
                 font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                 font-variant-numeric: tabular-nums; }

    .board {
      display: grid;
      grid-template-columns: 1fr 1.25fr 1fr;
      gap: 1.5vw;
      padding: 1.5vh 1.5vw calc(var(--sb-height, 34px) + 1.5vh);
      width: 100vw; height: 100vh;
    }
    /* When ?rosters=off, the centre column takes the full width. */
    body.no-rosters .board { grid-template-columns: 1fr; }
    body.no-rosters .roster { display: none; }

    /* ============================================================
       Rosters — identical column layout on both sides, no mirroring
       ============================================================ */

    .roster { align-self: center; display: flex; flex-direction: column; }
    .roster-head, .roster-row {
      display: grid;
      grid-template-columns: var(--roster-cols);
      gap: 1vw;
      align-items: center;
    }
    .roster-head {
      color: var(--muted);
      font-size: 1.5vh;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 0.6vh 0.8vw;
      border-bottom: 1px solid var(--border);
    }
    .roster-head .num,
    .roster-head .name,
    .roster-head .fouls,
    .roster-head .pts { color: var(--muted); }

    .roster-row {
      padding: 0.45vh 0.8vw;
      border-bottom: 1px solid var(--dim);
      min-height: 4.2vh;
    }
    .roster-row.not-played { opacity: 0.35; }

    .roster .num {
      color: var(--white); font-weight: 700;
      font-size: 2.6vh; text-align: right;
    }
    .roster .name {
      color: var(--white); font-size: 2.6vh;
      text-transform: uppercase; letter-spacing: 0.04em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Foul dots — always render in numeric order (1..5 left to right),
       regardless of which side the player is on. */
    .roster .foul-dots {
      display: flex; gap: 0.3vw;
      justify-content: flex-start; align-items: center;
    }
    .roster .foul-dots .d {
      width: 1.6vh; height: 1.6vh; border-radius: 50%;
      background: transparent; border: 1px solid var(--border);
    }
    .roster .foul-dots .d.on        { background: var(--green); border-color: var(--green); }
    .roster .foul-dots .d.on.fifth  { background: var(--red);   border-color: var(--red); }
    .roster .foul-num {
      font-size: 2.4vh; font-weight: 700;
      color: var(--white); text-align: center;
    }
    .roster .foul-num.f4 { color: var(--amber); }
    .roster .foul-num.f5 { color: var(--red); }

    .roster .pts {
      font-size: 2.6vh; font-weight: 800; color: var(--red);
      text-shadow: 0 0 6px rgba(255,48,48,0.4);
      text-align: right;
    }

    /* Header cell alignment — match the data cells */
    .roster-head .num   { text-align: right; }
    .roster-head .name  { text-align: left; }
    .roster-head .fouls { text-align: center; }
    .roster-head .pts   { text-align: right; }

    /* ============================================================
       Centre column
       ============================================================ */

    .centre {
      display: grid;
      grid-template-rows: auto auto auto auto 1fr;
      gap: 2vh;
      align-items: center;
      text-align: center;
    }

    .pair { display: grid; grid-template-columns: 1fr 1fr; gap: 2vw;
            align-items: center; justify-items: center; }

    .team-name {
      position: fixed; z-index: 70;
      font-size: 4.5vh; font-weight: 900; color: var(--white);
      letter-spacing: 0.07em; line-height: 1.15;
      max-width: 28vw;
    }
    #home-tname { left: 1.5vw; top: 1.5vh; text-align: left; }
    #away-tname { right: 1.5vw; top: 1.5vh; text-align: right; }

    /* Stat rows: [home value]  LABEL  [away value] */
    .stat-row {
      display: grid; grid-template-columns: 1fr auto 1fr;
      gap: 2vw; align-items: center; width: 100%;
    }
    .stat-row > :first-child { justify-self: end; }
    .stat-row > :last-child  { justify-self: start; }
    .stat-row + .stat-row    { margin-top: 2vh; }

    .period-mid {
      justify-self: center;
      font-size: 4.5vh; font-weight: 900; color: var(--white);
      padding: 0.5vh 1.6vw;
      border: 0.35vh solid var(--white); border-radius: 0.6vh;
      letter-spacing: 0.05em; line-height: 1;
    }

    .score {
      font-size: 17vh; font-weight: 900; color: var(--red);
      line-height: 1;
      text-shadow: 0 0 14px rgba(255,48,48,0.55),
                   0 0 32px rgba(255,48,48,0.25);
    }

    .lbl {
      font-size: 2vh; color: #888;
      letter-spacing: 0.25em; text-transform: uppercase;
    }

    .tos { display: flex; justify-content: center; gap: 0.8vw; }
    .to-dot {
      width: 3vh; height: 3vh;
      background: var(--dim); border: 1px solid var(--border);
    }
    .to-dot.on { background: var(--yellow); border-color: var(--yellow); }

    .tf-value {
      position: relative;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 6.5vh; font-weight: 900; color: var(--white);
      width: 8vh; height: 9.5vh;
      border: 0.35vh solid var(--white); border-radius: 0.6vh;
      line-height: 1;
    }
    .tf-value.bonus {
      color: transparent; background: var(--red); border-color: var(--red);
    }
    .tf-value.bonus::after {
      content: "BONUS";
      position: absolute; bottom: 0.8vh; left: 0; right: 0;
      text-align: center; font-size: 1.3vh; font-weight: 700;
      color: #fff; letter-spacing: 0.12em;
    }

    .clock-block { display: flex; flex-direction: column;
                   align-items: center; justify-content: center;
                   gap: 0.5vh; align-self: end; }
    .game-clock {
      font-size: 14vh; font-weight: 900; color: var(--amber); line-height: 1;
      text-shadow: 0 0 14px rgba(255,140,26,0.55),
                   0 0 32px rgba(255,140,26,0.25);
    }
    .shot-mini { display: flex; gap: 1.2vw; align-items: baseline;
                 font-size: 4.5vh; color: var(--red);
                 text-shadow: 0 0 10px rgba(255,48,48,0.4); }
    .shot-mini.hidden .shot-value { opacity: 0.15; }
    .shot-mini .lbl-shot {
      font-size: 1.5vh; color: var(--muted);
      letter-spacing: 0.3em; text-transform: uppercase;
    }

    /* ============================================================
       Footer + edge-lights (unchanged)
       ============================================================ */

    .edge-lights {
      position: fixed; inset: 0; pointer-events: none; z-index: 60;
      box-shadow: inset 0 0 0 0 transparent;
      transition: box-shadow 0.15s ease-out;
    }
    .edge-lights.flash-period {
      box-shadow:
        inset 0 0 0 2.5vh rgba(255, 48, 48, 0.95),
        inset 0 0 14vh   rgba(255, 48, 48, 0.55),
        inset 0 0 28vh   rgba(255, 48, 48, 0.25);
    }
    .edge-lights.flash-shot {
      box-shadow:
        inset 0 0 0 2.5vh rgba(255, 210, 51, 0.95),
        inset 0 0 14vh   rgba(255, 210, 51, 0.55),
        inset 0 0 28vh   rgba(255, 210, 51, 0.25);
    }
  </style>
</head>
<body>

<div class="board">
  <!-- HOME ROSTER -->
  <div class="roster" id="home-block">
    <div class="roster-head" id="home-head"></div>
    <div id="home-roster"></div>
  </div>

  <!-- CENTRE -->
  <div class="centre">
    <div class="period-mid" id="period-mid">-</div>

    <div class="pair">
      <div class="score" id="home-score">0</div>
      <div class="score" id="away-score">0</div>
    </div>

    <div class="stat-row">
      <div class="tos" id="home-tos"></div>
      <div class="lbl">Time-outs</div>
      <div class="tos" id="away-tos"></div>
    </div>

    <div class="stat-row">
      <span class="tf-value" id="home-tf">0</span>
      <div class="lbl">Team fouls</div>
      <span class="tf-value" id="away-tf">0</span>
    </div>

    <div class="clock-block">
      <div class="game-clock" id="game-clock">10:00</div>
      <div class="shot-mini" id="shot-mini">
        <span class="lbl-shot">Shot</span>
        <span class="shot-value" id="shot-clock">24</span>
      </div>
    </div>
  </div>

  <!-- AWAY ROSTER (same column order as home; no mirroring) -->
  <div class="roster" id="away-block">
    <div class="roster-head" id="away-head"></div>
    <div id="away-roster"></div>
  </div>
</div>

<div id="edge-lights" class="edge-lights"></div>

<div class="team-name" id="home-tname"></div>
<div class="team-name" id="away-tname"></div>

<script src="/common.js"></script>
<script>
const $ = (id) => document.getElementById(id);

// -------- URL configuration --------
const params = new URLSearchParams(location.search);
const CFG = {
  name:    (params.get("name")    || "last-fi").toLowerCase(),
  numbers: (params.get("numbers") || "on").toLowerCase() !== "off",
  fouls:   (params.get("fouls")   || "dots").toLowerCase(),   // off|numeric|dots
  points:  (params.get("points")  || "on").toLowerCase() !== "off",
  rosters: (params.get("rosters") || "on").toLowerCase() !== "off",
};
if (!CFG.rosters) document.body.classList.add("no-rosters");

// -------- Roster column layout (shared by header + every row) --------
function buildRosterCols() {
  const cols = [];
  if (CFG.numbers)         cols.push("3ch");
  if (CFG.name !== "off")  cols.push("1fr");
  if (CFG.fouls !== "off") cols.push(CFG.fouls === "dots" ? "10vh" : "3ch");
  if (CFG.points)          cols.push("3ch");
  return cols.join(" ");
}
document.documentElement.style.setProperty("--roster-cols", buildRosterCols());

// -------- Roster headers (rendered once at boot) --------
function buildHeaderRow() {
  const frag = document.createDocumentFragment();
  if (CFG.numbers) {
    const e = document.createElement("span"); e.className = "num"; e.textContent = "#"; frag.appendChild(e);
  }
  if (CFG.name !== "off") {
    const e = document.createElement("span"); e.className = "name"; e.textContent = "Player"; frag.appendChild(e);
  }
  if (CFG.fouls !== "off") {
    const e = document.createElement("span"); e.className = "fouls"; e.textContent = "Fouls"; frag.appendChild(e);
  }
  if (CFG.points) {
    const e = document.createElement("span"); e.className = "pts"; e.textContent = "Pts"; frag.appendChild(e);
  }
  return frag;
}
$("home-head").appendChild(buildHeaderRow());
$("away-head").appendChild(buildHeaderRow());

// -------- Name formatting --------
function formatPlayerName(full) {
  if (CFG.name === "off" || !full) return "";
  const parts = String(full).trim().split(/\s+/);
  if (parts.length === 0) return "";
  const last = parts[parts.length - 1];
  const first = parts.length > 1 ? parts[0] : "";
  const init = first ? first[0].toUpperCase() + "." : "";
  switch (CFG.name) {
    case "last":        return last;
    case "fi-last":     return init ? `${init} ${last}` : last;
    case "last-fi":     return init ? `${last}, ${init}` : last;
    case "first-last":  return first ? `${first} ${last}` : last;
    default:            return last;
  }
}

// -------- Roster row builder --------
function rosterRowEl(p) {
  const row = document.createElement("div");
  row.className = "roster-row" + (p.played === false ? " not-played" : "");

  if (CFG.numbers) {
    const e = document.createElement("div"); e.className = "num";
    e.textContent = p.number || "";
    row.appendChild(e);
  }
  if (CFG.name !== "off") {
    const e = document.createElement("div"); e.className = "name";
    e.textContent = formatPlayerName(p.name);
    row.appendChild(e);
  }
  if (CFG.fouls === "numeric") {
    const e = document.createElement("div");
    e.className = "foul-num" + (p.fouls >= 5 ? " f5" : p.fouls === 4 ? " f4" : "");
    e.textContent = (p.played === false) ? "" : String(p.fouls);
    row.appendChild(e);
  } else if (CFG.fouls === "dots") {
    const e = document.createElement("div"); e.className = "foul-dots";
    if (p.played !== false) {
      for (let i = 0; i < 5; i++) {
        const d = document.createElement("div"); d.className = "d";
        if (p.fouls > i) {
          d.classList.add("on");
          if (i === 4) d.classList.add("fifth");
        }
        e.appendChild(d);
      }
    }
    row.appendChild(e);
  }
  if (CFG.points) {
    const e = document.createElement("div"); e.className = "pts";
    e.textContent = (p.played === false) ? "" : String(p.points);
    row.appendChild(e);
  }
  return row;
}

function renderRoster(side, players) {
  const root = $(`${side}-roster`);
  root.innerHTML = "";
  for (const p of players) root.appendChild(rosterRowEl(p));
}

// -------- Apply state snapshot --------
function applyState(s) {
  $("home-tname").textContent = (s.home.name || "HOME").toUpperCase();
  $("away-tname").textContent = (s.away.name || "AWAY").toUpperCase();

  $("home-score").textContent = s.home.score;
  $("away-score").textContent = s.away.score;

  $("period-mid").textContent = s.period_short || String(s.period_indicator || "-");

  for (const side of ["home", "away"]) {
    const t = s[side];
    const el = $(`${side}-tf`);
    if (t.bonus) {
      el.classList.add("bonus");
      el.textContent = "";
    } else {
      el.classList.remove("bonus");
      el.textContent = t.team_fouls;
    }
  }

  for (const side of ["home", "away"]) {
    const info = Scoreboard.computeTimeoutDots(side, s);
    const tos = $(`${side}-tos`);
    const sig = `${info.filled}/${info.max}`;
    if (tos.dataset.sig !== sig) {
      tos.innerHTML = "";
      for (let i = 0; i < info.max; i++) {
        const d = document.createElement("div");
        d.className = "to-dot" + (i < info.filled ? " on" : "");
        tos.appendChild(d);
      }
      tos.dataset.sig = sig;
    }
  }

  renderRoster("home", s.home.players || []);
  renderRoster("away", s.away.players || []);
}
Scoreboard.onState(applyState);

// -------- Animation loop for the clocks --------
function tick() {
  const s = Scoreboard.getState();
  if (s) {
    $("game-clock").textContent = Scoreboard.formatClock(
      Scoreboard.computeDisplayedGameMs(), { showTenths: true });

    const sm = $("shot-mini");
    if (s.sc_visible) {
      $("shot-clock").textContent = Scoreboard.formatShot(
        Scoreboard.computeDisplayedShotMs());
      sm.classList.remove("hidden");
    } else {
      $("shot-clock").textContent = "·";
      sm.classList.add("hidden");
    }
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

// -------- Buzzer / fullscreen --------
Scoreboard.onBuzzer((b) => {
  const el = $("edge-lights");
  if (b.kind === "period") {
    el.classList.add("flash-period");
    setTimeout(() => el.classList.remove("flash-period"), 2000);
  } else if (b.kind === "shot_clock") {
    el.classList.add("flash-shot");
    setTimeout(() => el.classList.remove("flash-shot"), 1000);
  }
});


Scoreboard.connect();
</script>
</body>
</html>
