<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Visuals Op</title>
  <style>
    /* ------------------------------------------------------------------- *
     * Visuals operator console (FIBA scorer's table).
     *
     * Covers everything the scoreboard shows EXCEPT the clocks: period
     * indicator, both teams' scores, team fouls + bonus, time-outs, and
     * per-player points/fouls. Clock controls are deliberately absent --
     * those live on /timer and /shotclock-op.
     *
     * Layout:
     *   Top  (sticky)   -- period bar + per-team score / fouls / TO summaries
     *   Mid  (scroll)   -- two columns, home + away, score/foul/TO buttons
     *                      and a compact per-player roster
     *   Foot (sticky)   -- between-period resets
     *
     * Touch-tuned for a ~10–12" landscape tablet, but reflows to a single
     * column on phone-portrait so the scorer can use a phone in a pinch.
     * --------------------------------------------------------------------*/
    :root {
      --bg: #0e1116;
      --panel: #161b22;
      --panel-2: #1f262f;
      --panel-3: #28303a;
      --border: #2a313c;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #ff8c1a;
      --accent-dim: #b96712;
      --green: #2ea043;
      --green-2: #46c563;
      --red: #da3633;
      --red-2: #ff5247;
      --yellow: #d4a017;
      --blue: #2f81f7;
      --cyan: #22d3ee;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   Oxygen, Ubuntu, sans-serif;
      touch-action: manipulation;
      -webkit-user-select: none; user-select: none;
    }
    body { display: flex; flex-direction: column; min-height: 100vh; }

    /* ===================  STICKY TOP BAR  =================== */
    /* Layout: HOME on the left, PERIOD centred in the middle (visually
       smaller — it's a secondary control), AWAY on the right. Reflows
       to a single column on phone-portrait. */
    .top-bar {
      position: sticky; top: 0; z-index: 10;
      background: var(--bg); border-bottom: 1px solid var(--border);
      padding: 8px; display: grid;
      grid-template-columns: 5fr 3fr 5fr; gap: 8px; align-items: stretch;
    }
    @media (max-width: 720px) { .top-bar { grid-template-columns: 1fr; } }

    .period-card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 12px; min-width: 0;
      display: flex; flex-direction: column; gap: 6px; align-items: center;
      justify-content: center; text-align: center;
    }
    .period-card .lbl { font-size: 10px; color: var(--muted);
                        text-transform: uppercase; letter-spacing: 2px; }
    .period-card .name {
      font-family: ui-monospace, monospace; font-weight: 800;
      font-size: clamp(22px, 3vw, 32px); color: var(--accent);
      line-height: 1;
    }
    .period-card .pos { font-size: 11px; color: var(--muted);
                        font-family: ui-monospace, monospace; }
    .period-card .ctrls { display: flex; gap: 6px; }
    .period-card button { min-width: 56px; min-height: 48px; font-size: 24px;
                          font-weight: 800; padding: 0; }

    /* Per-team summary block. Headline row (name) + a 3-column metrics
       grid: Score, Team Fouls, Time-outs (with dots + max toggle).
       AWAY uses .ra to right-align contents so the indicator order is
       mirrored visually (still labels on top, big number below). */
    .summary {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 8px 12px; min-width: 0;
      display: grid; gap: 4px;
      grid-template-rows: auto 1fr;
    }
    .summary.home { border-left: 4px solid var(--accent); }
    .summary.away { border-right: 4px solid var(--blue); }
    .summary .name-row {
      display: flex; align-items: baseline; gap: 8px; min-width: 0;
      font-size: 13px; font-weight: 700; letter-spacing: 1px;
    }
    .summary .name {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .summary .short { color: var(--muted); font-size: 11px;
                      font-family: ui-monospace, monospace; }
    .summary.away .name-row { justify-content: flex-end; }

    .summary .metrics {
      display: grid; grid-template-columns: 1.1fr 1fr 1.4fr;
      gap: 6px; align-items: center;
    }
    .summary .metric {
      display: flex; flex-direction: column; gap: 2px; min-width: 0;
      align-items: center; padding: 4px 2px;
    }
    .summary .metric-lbl {
      font-size: 9px; color: var(--muted);
      letter-spacing: 1.5px; text-transform: uppercase;
    }
    .summary .metric-val {
      font-family: ui-monospace, monospace; font-weight: 900;
      line-height: 1;
    }
    .summary .metric.score .metric-val   { font-size: clamp(40px, 6vw, 64px);
                                           color: var(--text); }
    .summary .metric.tf    .metric-val   { font-size: clamp(30px, 4.5vw, 48px);
                                           color: var(--accent); }
    .summary .metric.tf.bonus .metric-val{ color: var(--red); }
    .summary .metric.tf .bonus-flag {
      display: none;
      font-size: 9px; font-weight: 900; letter-spacing: 2px;
      padding: 1px 6px; border-radius: 999px;
      background: var(--red); color: #fff;
    }
    .summary .metric.tf.bonus .bonus-flag { display: inline-block; }

    /* Time-out dots: filled = "remaining" (or taken, per mode). */
    .summary .dots {
      display: flex; gap: 4px; justify-content: center; padding: 4px 0 2px;
      min-height: 22px; align-items: center;
    }
    .summary .dots .dot {
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--panel-3); border: 2px solid var(--border);
    }
    .summary .dots .dot.lit {
      background: var(--cyan); border-color: var(--cyan);
      box-shadow: 0 0 6px -1px var(--cyan);
    }
    .summary .max-toggle {
      display: flex; gap: 2px; align-items: center; justify-content: center;
      font-size: 9px; color: var(--muted); letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .summary .max-toggle button {
      min-height: 22px; min-width: 22px;
      padding: 1px 6px; font-size: 11px; font-weight: 800;
      border-radius: 4px; background: var(--panel-3);
      border: 1px solid var(--border); color: var(--text);
    }
    .summary .max-toggle button.active {
      background: var(--cyan); border-color: var(--cyan); color: #001;
    }

    /* ===================  MAIN: TEAM CONTROLS  =================== */
    main {
      flex: 1;
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
      padding: 8px;
    }
    @media (max-width: 900px) { main { grid-template-columns: 1fr; } }

    .team-pane {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px;
      display: flex; flex-direction: column; gap: 8px; min-width: 0;
    }
    .team-pane.home { border-top: 3px solid var(--accent); }
    .team-pane.away { border-top: 3px solid var(--blue);   }
    .team-pane h2 {
      margin: 0; font-size: 13px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1.5px;
      display: flex; justify-content: space-between; align-items: center;
    }

    /* Row of big buttons (score, foul, TO controls) */
    .row { display: grid; gap: 4px; }
    .row.cols-2 { grid-template-columns: 1fr 1fr; }
    .row.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    .row.cols-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
    .row.cols-5 { grid-template-columns: 1.2fr 1.2fr 1.2fr 0.8fr 0.8fr; }

    button {
      background: var(--panel-2); color: var(--text);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 8px 0; font-size: 18px; font-weight: 800;
      cursor: pointer; font-family: inherit;
      min-height: 54px;
      transition: background .06s, transform .04s;
    }
    button:active { transform: translateY(1px); }
    button.score    { background: var(--accent); border-color: var(--accent);
                      color: #111; }
    button.score.minus { background: var(--panel-3); color: var(--text);
                         font-size: 16px; }
    button.foul-add { background: #5c1c1d; border-color: var(--red);
                      color: #fff; font-size: 16px; }
    button.foul-undo{ background: var(--panel-3); color: var(--text);
                      font-size: 14px; }
    button.bonus    { background: var(--panel-3); color: var(--accent);
                      border-color: var(--accent); font-size: 15px; }
    button.bonus.on { background: var(--red); border-color: var(--red-2);
                      color: #fff; }
    button.to-add   { background: #105066; border-color: var(--cyan); color: #fff;
                      font-size: 16px; }
    button.to-undo  { background: var(--panel-3); color: var(--text);
                      font-size: 14px; }
    button.ghost { background: transparent; border-color: var(--border);
                   color: var(--muted); font-weight: 700; }
    button[disabled] { opacity: 0.4; cursor: not-allowed; }
    .btn-legend { font-size: 10px; color: #ffffff80; padding-left: 4px;
                  letter-spacing: 1px; }

    /* --------- Compact per-player roster --------- */
    .roster {
      display: flex; flex-direction: column; gap: 4px; margin-top: 4px;
    }
    .player {
      display: grid;
      /* played | num | name | F | P | +1 | +2 | +3 | -1 | +F | -F */
      grid-template-columns: 38px 36px 1fr 28px 32px 38px 38px 38px 38px 38px 38px;
      gap: 3px; align-items: stretch;
      background: var(--panel-2); border: 1px solid var(--border);
      border-radius: 8px; padding: 4px 6px;
      min-height: 44px;
    }
    .player.disqualified { background: #3a1a1a; border-color: var(--red); }
    .player.notplayed { opacity: 0.7; }
    .player .num {
      font-family: ui-monospace, monospace; font-weight: 800;
      font-size: 18px; color: var(--text); text-align: center;
      align-self: center;
    }
    .player .nm {
      font-size: 13px; font-weight: 600; color: var(--text);
      align-self: center; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .player.notplayed .nm { color: var(--muted); }
    .player .pf, .player .pp {
      font-family: ui-monospace, monospace; font-weight: 800;
      align-self: center; text-align: center; line-height: 1;
      font-size: 16px;
    }
    .player .pp { color: var(--accent); }
    .player .pf.f4 { color: var(--accent); }
    .player .pf.f5 { color: var(--red); }
    .player.notplayed .pf, .player.notplayed .pp { color: var(--muted); }
    .player button {
      min-height: 34px; padding: 0; font-size: 13px; font-weight: 800;
      letter-spacing: 0; border-radius: 6px;
    }
    .player button.p1, .player button.p2, .player button.p3 {
      background: var(--accent); border-color: var(--accent); color: #111;
    }
    .player button.pm1 {
      background: var(--panel-3); color: var(--text); font-size: 12px;
    }
    .player button.pf-add {
      background: #5c1c1d; border-color: var(--red); color: #fff;
    }
    .player button.pf-undo {
      background: var(--panel-3); color: var(--text); font-size: 12px;
    }
    /* "On court / has played" toggle. Touch-friendly square button rather
       than a tiny checkbox; the scorer flips it the first time the player
       takes the court. It auto-flips True the moment a positive stat
       (point or foul) is recorded for the player (see state.py), but a
       manual flip is needed for "subbed in but no stat yet" cases. */
    .player .played-btn {
      background: var(--panel-3); color: var(--muted);
      border: 1px solid var(--border); font-size: 18px; font-weight: 900;
      line-height: 1; min-height: 34px;
      border-radius: 6px;
    }
    .player .played-btn.on {
      background: var(--green); border-color: var(--green-2); color: #fff;
    }

    /* ===================  STICKY FOOTER  =================== */
    .foot-bar {
      position: sticky; bottom: 0; z-index: 10;
      background: var(--bg); border-top: 1px solid var(--border);
      padding: 8px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .foot-bar button { background: var(--accent-dim); border-color: var(--accent);
                       color: #fff; font-size: 16px; min-height: 50px; }

    .status-strip {
      position: fixed; top: 4px; right: 8px;
      display: flex; gap: 10px; font-size: 10px; color: var(--muted);
      pointer-events: none; opacity: 0.7; z-index: 11;
    }

    @media (max-width: 540px) {
      /* On phone-portrait, drop the per-player score-minus and foul-undo
         columns so the row stays readable; ±1 / −F are still on /.
         Played toggle stays visible (it's the primary first-action). */
      .player { grid-template-columns: 36px 32px 1fr 26px 30px 40px 40px 40px 40px; }
      .player .pm1, .player .pf-undo { display: none; }
    }
  </style>
</head>
<body>

<!-- ===================  STICKY TOP BAR  =================== -->
<!-- Order: HOME (left) | PERIOD (centre) | AWAY (right).
     Each summary shows prominent Score, Team Fouls (with BONUS flag) and
     a Time-outs dot strip plus a 2/3-max toggle (the timeout allowance
     legitimately changes during the game per FIBA rules). -->
<div class="top-bar">

  <div class="summary home" data-team="home">
    <div class="name-row">
      <span class="name" data-bind="name">HOME</span>
      <span class="short" data-bind="short">HOM</span>
    </div>
    <div class="metrics">
      <div class="metric score">
        <span class="metric-lbl">Score</span>
        <span class="metric-val" data-bind="score">0</span>
      </div>
      <div class="metric tf" data-bind="tf-wrap">
        <span class="metric-lbl">Team Fouls</span>
        <span class="metric-val" data-bind="tf">0</span>
        <span class="bonus-flag">BONUS</span>
      </div>
      <div class="metric to">
        <span class="metric-lbl">Time-outs</span>
        <div class="dots" data-bind="to-dots"></div>
        <div class="max-toggle">
          Max
          <button data-act="to-max" data-max="2">2</button>
          <button data-act="to-max" data-max="3">3</button>
        </div>
      </div>
    </div>
  </div>

  <div class="period-card">
    <span class="lbl">Period</span>
    <div class="name" id="period-name">—</div>
    <div class="pos"><span id="period-pos">0</span> / <span id="period-total">0</span>
      · <span id="period-short">--</span>
      · ind <span id="period-indicator">0</span></div>
    <div class="ctrls">
      <button id="btn-period-down" title="Previous period">−</button>
      <button id="btn-period-up"   title="Next period">+</button>
    </div>
  </div>

  <div class="summary away" data-team="away">
    <div class="name-row">
      <span class="short" data-bind="short">AWY</span>
      <span class="name" data-bind="name">AWAY</span>
    </div>
    <div class="metrics">
      <div class="metric score">
        <span class="metric-lbl">Score</span>
        <span class="metric-val" data-bind="score">0</span>
      </div>
      <div class="metric tf" data-bind="tf-wrap">
        <span class="metric-lbl">Team Fouls</span>
        <span class="metric-val" data-bind="tf">0</span>
        <span class="bonus-flag">BONUS</span>
      </div>
      <div class="metric to">
        <span class="metric-lbl">Time-outs</span>
        <div class="dots" data-bind="to-dots"></div>
        <div class="max-toggle">
          Max
          <button data-act="to-max" data-max="2">2</button>
          <button data-act="to-max" data-max="3">3</button>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- ===================  TEAM PANELS  =================== -->
<main id="teams"></main>

<!-- ===================  STICKY FOOTER  =================== -->
<div class="foot-bar">
  <button id="btn-reset-team-fouls">Reset team fouls (both)</button>
  <button id="btn-reset-timeouts">Reset time-outs (both)</button>
</div>

<div class="status-strip">
  <span id="ws-status">connecting…</span>
  <span id="rtt-status"></span>
  <span>/visuals — scorer console</span>
</div>

<script src="/common.js"></script>
<script>
(() => {
  "use strict";

  const $ = (id) => document.getElementById(id);
  const teamsRoot = $("teams");

  // ----- Team pane template (no roster yet; rendered into .roster). ----- //
  function teamPaneHTML(side) {
    const label = side === "home" ? "HOME" : "AWAY";
    return `
      <section class="team-pane ${side}" data-team="${side}">
        <h2>
          <span data-bind="team-name">${label}</span>
          <span class="ghost" style="font-size:11px;color:var(--muted)">
            <span data-bind="team-short">${side === "home" ? "HOM" : "AWY"}</span>
          </span>
        </h2>

        <!-- Score row -->
        <div class="row cols-4">
          <button class="score" data-act="score" data-pts="1">+1</button>
          <button class="score" data-act="score" data-pts="2">+2</button>
          <button class="score" data-act="score" data-pts="3">+3</button>
          <button class="score minus" data-act="score" data-pts="-1">−1</button>
        </div>

        <!-- Team-foul + bonus + timeout row -->
        <div class="row cols-5">
          <button class="foul-add"  data-act="team-foul-add">Foul +</button>
          <button class="foul-undo" data-act="team-foul-undo">Foul −</button>
          <button class="bonus"     data-act="bonus" data-bind="bonus">Bonus</button>
          <button class="to-add"    data-act="timeout-add">TO +</button>
          <button class="to-undo"   data-act="timeout-undo">TO −</button>
        </div>

        <!-- Roster (filled by render()) -->
        <div class="roster" data-bind="roster"></div>
      </section>
    `;
  }

  teamsRoot.innerHTML = teamPaneHTML("home") + teamPaneHTML("away");

  // ----- Per-player row template -----
  function playerRowHTML(idx, p) {
    const played = p.played !== false;
    const foulCls = played && p.fouls >= 5 ? " f5" : (played && p.fouls === 4 ? " f4" : "");
    const fouls = played ? p.fouls : "—";
    const pts   = played ? p.points : "—";
    const cls = `player${p.disqualified ? " disqualified" : ""}${played ? "" : " notplayed"}`;
    // We deliberately don't render the number/name as inputs here -- roster
    // editing lives on / so the scorer can't accidentally rename anyone
    // mid-game.
    return `
      <div class="${cls}" data-idx="${idx}">
        <button class="played-btn${played ? " on" : ""}" data-act="played"
                data-bind="played-btn"
                title="${played ? 'Has played in this game' : 'Tap when player first takes the court'}">
          ${played ? "✓" : "○"}
        </button>
        <div class="num"  data-bind="num"  >${escapeHTML(p.number || "")}</div>
        <div class="nm"   data-bind="name" >${escapeHTML(p.name || "")}</div>
        <div class="pf${foulCls}" data-bind="pf">${fouls}</div>
        <div class="pp"   data-bind="pp">${pts}</div>
        <button class="p1"      data-act="pp" data-pts="1">+1</button>
        <button class="p2"      data-act="pp" data-pts="2">+2</button>
        <button class="p3"      data-act="pp" data-pts="3">+3</button>
        <button class="pm1"     data-act="pp" data-pts="-1" title="Subtract one point">−1</button>
        <button class="pf-add"  data-act="pf">+F</button>
        <button class="pf-undo" data-act="pf-undo" title="Subtract a foul">−F</button>
      </div>
    `;
  }

  function escapeHTML(s) {
    return String(s).replace(/[&<>"']/g, (c) =>
      ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));
  }

  // ---------- click delegation ----------
  document.body.addEventListener("click", (ev) => {
    const btn = ev.target.closest("button");
    if (!btn) return;

    // ID-based dispatch FIRST (these buttons have no data-act). If we let
    // the !act gate run before this, the period +/- and reset buttons
    // would all be silently dropped.
    if (btn.id === "btn-period-up")   { Scoreboard.sendCommand("adjust_period", { delta:  1 }); return; }
    if (btn.id === "btn-period-down") { Scoreboard.sendCommand("adjust_period", { delta: -1 }); return; }
    if (btn.id === "btn-reset-team-fouls") { Scoreboard.sendCommand("reset_team_fouls"); return; }
    if (btn.id === "btn-reset-timeouts")   { Scoreboard.sendCommand("reset_timeouts");   return; }

    const act = btn.dataset.act;
    if (!act) return;

    // Top-bar summary cards (TO max toggle)
    const sumEl = btn.closest(".summary");
    if (sumEl) {
      const team = sumEl.dataset.team;
      if (act === "to-max") {
        // Single setting -- timeout_max is a session-level cap that
        // applies to both teams. The button still lives on each summary
        // card so the scorer can change it from either side; the server
        // op set_timeout_settings clamps and broadcasts.
        Scoreboard.sendCommand("set_timeout_settings",
          { max_count: +btn.dataset.max });
        return;
      }
    }

    // Per-team panes
    const paneEl = btn.closest(".team-pane");
    if (!paneEl) return;
    const team = paneEl.dataset.team;

    const playerEl = btn.closest(".player");
    if (playerEl) {
      const idx = +playerEl.dataset.idx;
      if (act === "pp") {
        Scoreboard.sendCommand("add_player_points",
          { team, player_index: idx, points: +btn.dataset.pts });
      } else if (act === "pf") {
        Scoreboard.sendCommand("add_player_foul", { team, player_index: idx });
      } else if (act === "pf-undo") {
        Scoreboard.sendCommand("subtract_player_foul", { team, player_index: idx });
      } else if (act === "played") {
        // Toggle. Note: any positive stat (point or +F) also auto-flips
        // played=True server-side, so this manual flip is for the
        // "subbed in but no stat yet recorded" case.
        const st = Scoreboard.getState();
        const cur = st?.[team]?.players?.[idx]?.played;
        Scoreboard.sendCommand("set_player_played",
          { team, player_index: idx, on: !cur });
      }
      return;
    }

    if (act === "score") {
      Scoreboard.sendCommand("add_score", { team, points: +btn.dataset.pts });
    } else if (act === "team-foul-add") {
      Scoreboard.sendCommand("add_team_foul", { team });
    } else if (act === "team-foul-undo") {
      const st = Scoreboard.getState();
      const cur = (st?.[team]?.team_fouls) || 0;
      Scoreboard.sendCommand("set_team_foul", { team, value: Math.max(0, cur - 1) });
    } else if (act === "bonus") {
      const st = Scoreboard.getState();
      Scoreboard.sendCommand("set_bonus", { team, on: !(st?.[team]?.bonus) });
    } else if (act === "timeout-add") {
      Scoreboard.sendCommand("add_timeout", { team });
    } else if (act === "timeout-undo") {
      const st = Scoreboard.getState();
      const cur = (st?.[team]?.timeouts_taken) || 0;
      Scoreboard.sendCommand("set_timeouts", { team, taken: Math.max(0, cur - 1) });
    }
  });

  // ---------- keyboard ----------
  // The scorer is mostly tapping, but a few power-user shortcuts help.
  //
  //   [   /   ]    -> period -/+
  //   R            -> reset team fouls (both)
  //   T            -> reset time-outs (both)
  //
  // Per-team score/foul/TO are NOT keyboard-bound since you'd be ambiguous
  // about which team. The buttons themselves are big enough to tap fast.
  document.addEventListener("keydown", (e) => {
    if (e.target && e.target.tagName === "INPUT") return;
    if (e.repeat) return;
    if      (e.key === "[")            Scoreboard.sendCommand("adjust_period", { delta: -1 });
    else if (e.key === "]")            Scoreboard.sendCommand("adjust_period", { delta:  1 });
    else if (e.key === "r" || e.key === "R") Scoreboard.sendCommand("reset_team_fouls");
    else if (e.key === "t" || e.key === "T") Scoreboard.sendCommand("reset_timeouts");
  });

  // ---------- render loop (driven by state, but throttled by raf) ----------
  let dirty = true;
  Scoreboard.onState(() => { dirty = true; });

  function paint() {
    if (dirty) {
      dirty = false;
      applyState(Scoreboard.getState());
    }
    requestAnimationFrame(paint);
  }
  requestAnimationFrame(paint);

  function applyState(s) {
    if (!s) return;

    // ----- period -----
    const total = (s.periods || []).length;
    const idx = (s.period_index || 0) + 1;
    $("period-name").textContent = s.period_name || "—";
    $("period-pos").textContent  = idx;
    $("period-total").textContent = total;
    $("period-short").textContent = s.period_short || "--";
    $("period-indicator").textContent = s.period_indicator ?? 0;
    $("btn-period-down").disabled = (s.period_index || 0) <= 0;
    $("btn-period-up").disabled   = (s.period_index || 0) >= total - 1;

    // ----- top summary cards -----
    const toMax = Math.max(1, s.timeout_max || 3);
    for (const side of ["home", "away"]) {
      const t = s[side] || {};
      const card = document.querySelector(`.summary[data-team="${side}"]`);
      if (!card) continue;
      card.querySelector('[data-bind="name"]').textContent  = t.name  || side.toUpperCase();
      card.querySelector('[data-bind="short"]').textContent = t.short || (side === "home" ? "HOM" : "AWY");
      card.querySelector('[data-bind="score"]').textContent = t.score ?? 0;

      // Team Fouls + BONUS flag.
      const tfWrap = card.querySelector('[data-bind="tf-wrap"]');
      tfWrap.classList.toggle("bonus", !!t.bonus);
      card.querySelector('[data-bind="tf"]').textContent = t.team_fouls ?? 0;

      // Time-out dots strip — uses the shared dots calc so the indicator
      // matches the main scoreboard / fouls cards exactly.
      const toInfo = Scoreboard.computeTimeoutDots(side, s);
      const dotsHost = card.querySelector('[data-bind="to-dots"]');
      if (!dotsHost.dataset.built || +dotsHost.dataset.built !== toInfo.max) {
        dotsHost.innerHTML = "";
        for (let i = 0; i < toInfo.max; i++) {
          const d = document.createElement("div");
          d.className = "dot";
          dotsHost.appendChild(d);
        }
        dotsHost.dataset.built = toInfo.max;
      }
      Array.from(dotsHost.children).forEach((d, i) =>
        d.classList.toggle("lit", i < toInfo.filled));

      // Highlight the active TO-max button (2 or 3).
      card.querySelectorAll('.max-toggle button').forEach(btn =>
        btn.classList.toggle("active", +btn.dataset.max === toMax));
    }

    // ----- team panes -----
    for (const side of ["home", "away"]) {
      const t = s[side] || {};
      const pane = document.querySelector(`.team-pane[data-team="${side}"]`);
      pane.querySelector('[data-bind="team-name"]').textContent  = t.name || side.toUpperCase();
      pane.querySelector('[data-bind="team-short"]').textContent = t.short || "—";
      // Bonus button reflection
      const bonusBtn = pane.querySelector('button[data-bind="bonus"]');
      if (bonusBtn) {
        bonusBtn.classList.toggle("on", !!t.bonus);
        bonusBtn.textContent = t.bonus ? "BONUS ON" : "Bonus";
      }
      renderRoster(pane.querySelector('[data-bind="roster"]'), side, t.players || []);
    }
  }

  function renderRoster(host, side, players) {
    // Rebuild if count changed; otherwise update in place to avoid wiping
    // any pressed-state.
    if (!host.dataset.built || +host.dataset.built !== players.length) {
      host.innerHTML = players.map((p, i) => playerRowHTML(i, p)).join("");
      host.dataset.built = players.length;
      return;
    }
    players.forEach((p, i) => {
      const row = host.children[i];
      if (!row) return;
      const played = p.played !== false;
      row.classList.toggle("disqualified", !!p.disqualified);
      row.classList.toggle("notplayed", !played);
      row.querySelector('[data-bind="num"]').textContent  = p.number || "";
      row.querySelector('[data-bind="name"]').textContent = p.name || "";
      const pf = row.querySelector('[data-bind="pf"]');
      pf.textContent = played ? p.fouls : "—";
      pf.classList.toggle("f4", played && p.fouls === 4);
      pf.classList.toggle("f5", played && p.fouls >= 5);
      row.querySelector('[data-bind="pp"]').textContent = played ? p.points : "—";
      const playedBtn = row.querySelector('[data-bind="played-btn"]');
      if (playedBtn) {
        playedBtn.classList.toggle("on", played);
        playedBtn.textContent = played ? "✓" : "○";
        playedBtn.title = played ? "Has played in this game"
                                 : "Tap when player first takes the court";
      }
    });
  }

  // ---------- status display ----------
  const wsStatusEl  = $("ws-status");
  const rttStatusEl = $("rtt-status");
  Scoreboard.onStatus(({ status }) => {
    wsStatusEl.textContent = status === "open" ? "● live"
                           : status === "connecting" ? "connecting…"
                           : "● disconnected";
    wsStatusEl.style.color = status === "open" ? "var(--green-2)"
                            : status === "connecting" ? "var(--muted)"
                            : "var(--red-2)";
  });
  setInterval(() => {
    const rtt = Scoreboard.getBestRttMs();
    rttStatusEl.textContent = isFinite(rtt) ? `RTT ${rtt.toFixed(0)}ms` : "";
  }, 1000);

  Scoreboard.connect();
})();
</script>
</body>
</html>
